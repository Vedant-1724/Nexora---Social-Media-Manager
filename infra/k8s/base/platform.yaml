# ── API Gateway ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
    spec:
      containers:
        - name: api-gateway
          image: nexora/api-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: nexora-platform-config
            - secretRef:
                name: nexora-platform-secrets
          env:
            - name: NEXORA_DOWNSTREAM_AUTH_SERVICE_URL
              value: http://auth-service:8080
            - name: NEXORA_DOWNSTREAM_USER_SERVICE_URL
              value: http://user-service:8080
            - name: NEXORA_DOWNSTREAM_SOCIAL_INTEGRATION_SERVICE_URL
              value: http://social-integration-service:8080
            - name: NEXORA_DOWNSTREAM_POST_SCHEDULER_SERVICE_URL
              value: http://post-scheduler-service:8080
            - name: NEXORA_DOWNSTREAM_ANALYTICS_SERVICE_URL
              value: http://analytics-service:8080
            - name: NEXORA_DOWNSTREAM_NOTIFICATION_SERVICE_URL
              value: http://notification-service:8080
            - name: NEXORA_DOWNSTREAM_BILLING_SERVICE_URL
              value: http://billing-service:8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
---
# ── Auth Service ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tier: backend
    spec:
      containers:
        - name: auth-service
          image: nexora/auth-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: nexora-platform-config
            - secretRef:
                name: nexora-platform-secrets
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/nexora?currentSchema=auth_service
            - name: NEXORA_AUTH_USER_SERVICE_BASE_URL
              value: http://user-service:8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
---
