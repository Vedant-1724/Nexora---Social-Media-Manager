name: Nexora CD — Build & Push to ECR

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1

jobs:
  # ── Build and Push Docker Images to ECR ────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: infra/docker/service.Dockerfile
            build_args: |
              SERVICE_DIR=services/api-gateway
              SERVICE_NAME=api-gateway
          - service: auth-service
            dockerfile: infra/docker/service.Dockerfile
            build_args: |
              SERVICE_DIR=services/auth-service
              SERVICE_NAME=auth-service
          - service: user-service
            dockerfile: infra/docker/service.Dockerfile
            build_args: |
              SERVICE_DIR=services/user-service
              SERVICE_NAME=user-service
          - service: social-integration-service
            dockerfile: infra/docker/service.Dockerfile
            build_args: |
              SERVICE_DIR=services/social-integration-service
              SERVICE_NAME=social-integration-service
          - service: post-scheduler-service
            dockerfile: infra/docker/service.Dockerfile
            build_args: |
              SERVICE_DIR=services/post-scheduler-service
              SERVICE_NAME=post-scheduler-service
          - service: analytics-service
            dockerfile: infra/docker/service.Dockerfile
            build_args: |
              SERVICE_DIR=services/analytics-service
              SERVICE_NAME=analytics-service
          - service: notification-service
            dockerfile: infra/docker/service.Dockerfile
            build_args: |
              SERVICE_DIR=services/notification-service
              SERVICE_NAME=notification-service
          - service: billing-service
            dockerfile: infra/docker/service.Dockerfile
            build_args: |
              SERVICE_DIR=services/billing-service
              SERVICE_NAME=billing-service
          - service: web
            dockerfile: infra/docker/web.Dockerfile
            build_args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/nexora/${{ matrix.service }}:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/nexora/${{ matrix.service }}:latest

  # ── Deploy to EKS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name nexora-dev-eks --region ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Kustomize set images
        run: |
          cd infra/k8s/overlays/production
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          TAG=${{ steps.meta.outputs.tag }}
          for svc in api-gateway auth-service user-service social-integration-service post-scheduler-service analytics-service notification-service billing-service web; do
            kustomize edit set image "nexora/${svc}=${REGISTRY}/nexora/${svc}:${TAG}"
          done

      - name: Apply to cluster
        run: kubectl kustomize infra/k8s/overlays/production | kubectl apply -f -

      - name: Wait for rollout
        run: |
          for deploy in api-gateway auth-service user-service social-integration-service post-scheduler-service analytics-service notification-service billing-service web; do
            kubectl rollout status deployment/${deploy} -n nexora --timeout=300s
          done
